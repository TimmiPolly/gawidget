name = "gawidget"

main = "src/index.ts"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]

# KV Namespace для production
[[kv_namespaces]]
binding = "MY_KV"
id = "ваш_production_kv_id"     # ← замени

# Test environment
[env.test]
name = "gawidget-test"

[[env.test.kv_namespaces]]
binding = "MY_KV"
id = "ваш_test_kv_id"           # ← замени на другой KV
